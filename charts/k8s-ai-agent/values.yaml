image:
  repository: k8s-ai-agent
  tag: "0.1.0"
  pullPolicy: IfNotPresent

backendUrl: ""
clusterId: ""
agentToken: ""
pollIntervalSeconds: 8

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 250m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
