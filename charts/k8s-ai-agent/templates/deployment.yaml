apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: k8s-ai-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ai-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ai-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      automountServiceAccountToken: true
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          env:
            - name: BACKEND_URL
              value: {{ required "backendUrl is required" .Values.backendUrl | quote }}
            - name: CLUSTER_ID
              value: {{ required "clusterId is required" .Values.clusterId | quote }}
            - name: AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}
                  key: agent-token
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.pollIntervalSeconds | quote }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
