apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: k8s-ai-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  agent-token: {{ required "agentToken is required" .Values.agentToken | quote }}
